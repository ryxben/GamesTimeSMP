configVersion = 4

#Frontier settings.
[frontier]

	[frontier.announcement]
		#Announce unnamed frontiers in chat/title.
		announceUnnamed = true

		[frontier.announcement.title]
			#Duration of title announcement, in game ticks.
			#Range: 0 ~ 1200
			duration = 70
			#Minimum time between consecutive title announcement, in game ticks.
			#Range: 0 ~ 1200
			timeout = 0
			#Show the frontier announcement above the hotbar instead of showing it as a title.
			aboveHotbar = true

	[frontier.editing]
		#Distance at which vertices snap to nearby vertices.
		#Range: 0 ~ 16
		snapDistance = 8

	[frontier.appearance]
		#Hide frontier names when they do not fit at the current zoom level.
		hideNamesThatDontFit = true

		[frontier.appearance.fill]
			#Transparency of the frontier fill. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 0.4

		[frontier.appearance.border]
			#Width of the frontier border.
			#Range: 0 ~ 64
			width = 0
			#Transparency of the frontier border. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 1.0

		[frontier.appearance.pathMarkers]
			#Size of path markers.
			#Range: 1 ~ 5
			size = 2
			#Transparency of path markers. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 1.0

		[frontier.appearance.text]
			#Size of the frontier text.
			#Range: 1 ~ 5
			size = 2
			#Transparency of the frontier text. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 1.0
			#Color of the frontier text. FrontierColor uses the frontier color. FrontierColorBright uses the same color at maximum brightness.
			#Allowed Values: FrontierColor, FrontierColorBright, White
			color = "FrontierColor"

		[frontier.appearance.banner]
			#Size of the frontier banner.
			#Range: 1 ~ 5
			size = 1
			#Transparency of the frontier banner. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 1.0

	[frontier.default]
		#Default first name line for new frontiers.
		name1 = "Новый"
		#Default second name line for new frontiers.
		name2 = "Рубеж"
		#Use a random color for new frontiers by default.
		randomColor = true
		#Fallback fixed color for new frontiers when random color is disabled.
		#Format: "RRGGBB". Also accepts "#RRGGBB", "0xRRGGBB", and "0xAARRGGBB".
		color = "E0E0E0"

		[frontier.default.visibility]
			#Default visibility for new frontiers.
			visible = true

			[frontier.default.visibility.announce]
				#Default chat announcement visibility for new frontiers.
				chat = false
				#Default title announcement visibility for new frontiers.
				title = false
				#Default collection mention visibility for new frontiers.
				mentionCollection = true

			[frontier.default.visibility.fullscreen]
				#Default fullscreen visibility for new frontiers.
				visible = true
				#Default fullscreen name visibility for new frontiers.
				name = true
				#Default fullscreen collection visibility for new frontiers.
				collection = false
				#Default fullscreen owner visibility for new frontiers.
				owner = false
				#Default fullscreen banner visibility for new frontiers.
				banner = false
				#Default fullscreen day visibility for new frontiers.
				day = true
				#Default fullscreen night visibility for new frontiers.
				night = true
				#Default fullscreen underground visibility for new frontiers.
				underground = true
				#Default fullscreen topo visibility for new frontiers.
				topo = true
				#Default fullscreen biome visibility for new frontiers.
				biome = true

			[frontier.default.visibility.minimap]
				#Default minimap visibility for new frontiers.
				visible = true
				#Default minimap name visibility for new frontiers.
				name = true
				#Default minimap collection visibility for new frontiers.
				collection = false
				#Default minimap owner visibility for new frontiers.
				owner = false
				#Default minimap banner visibility for new frontiers.
				banner = false
				#Default minimap day visibility for new frontiers.
				day = true
				#Default minimap night visibility for new frontiers.
				night = true
				#Default minimap underground visibility for new frontiers.
				underground = true
				#Default minimap topo visibility for new frontiers.
				topo = true
				#Default minimap biome visibility for new frontiers.
				biome = true

			[frontier.default.visibility.webmap]
				#Default webmap visibility for new frontiers.
				visible = true
				#Default webmap name visibility for new frontiers.
				name = true
				#Default webmap collection visibility for new frontiers.
				collection = false
				#Default webmap owner visibility for new frontiers.
				owner = false
				#Default webmap banner visibility for new frontiers.
				banner = false
				#Default webmap day visibility for new frontiers.
				day = true
				#Default webmap night visibility for new frontiers.
				night = true
				#Default webmap underground visibility for new frontiers.
				underground = true
				#Default webmap topo visibility for new frontiers.
				topo = true
				#Default webmap biome visibility for new frontiers.
				biome = true

		[frontier.default.pathStyle]
			#Marker identifier used by default for the start of new path frontiers.
			start = "mapfrontiers:big_dot"
			#Marker identifier used by default for inner points of new path frontiers.
			inner = "mapfrontiers:none"
			#Marker identifier used by default for the end of new path frontiers.
			end = "mapfrontiers:big_dot"
			#Marker identifier used by default for segments of new path frontiers.
			segment = "mapfrontiers:small_dot"
			#Show path labels and banner at the start by default.
			labelAtStart = true
			#Show path labels and banner at the midpoint by default.
			labelAtMiddle = false
			#Show path labels and banner at the end by default.
			labelAtEnd = false

	#Path settings.
	[frontier.path]

		[frontier.path.proximity]
			#Distance in blocks used to activate Path frontiers for HUD and announcements.
			#Range: 0 ~ 128
			enterDistance = 8
			#Distance in blocks used to keep Path frontiers active for HUD and announcements.
			#Range: 0 ~ 128
			exitDistance = 10

	[frontier.visibility]
		#Force all frontiers to be shown or hidden. In Custom, you can decide for each frontier.
		#Allowed Values: Custom, Always, Never
		visible = "Custom"

		[frontier.visibility.announce]
			#Force all frontiers to be announced in chat. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			chat = "Custom"
			#Force all frontiers to be announced as titles. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			title = "Custom"
			#Force collection names to be mentioned in local frontier announcements. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			mentionCollection = "Custom"

		[frontier.visibility.fullscreen]
			#Force all frontiers to be shown or hidden on the fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			visible = "Custom"
			#Force all frontier names to be shown or hidden on the fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			name = "Custom"
			#Force all frontier collection names to be shown or hidden on the fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			collection = "Custom"
			#Force all frontier owners to be shown or hidden on the fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			owner = "Custom"
			#Force all frontier banners to be shown or hidden on the fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			banner = "Custom"
			#Force all frontiers to be shown or hidden on the day fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			day = "Custom"
			#Force all frontiers to be shown or hidden on the night fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			night = "Custom"
			#Force all frontiers to be shown or hidden on the underground fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			underground = "Custom"
			#Force all frontiers to be shown or hidden on the topo fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			topo = "Custom"
			#Force all frontiers to be shown or hidden on the biome fullscreen map. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			biome = "Custom"

		[frontier.visibility.minimap]
			#Force all frontiers to be shown or hidden on the minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			visible = "Custom"
			#Force all frontier names to be shown or hidden on the minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			name = "Custom"
			#Force all frontier collection names to be shown or hidden on the minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			collection = "Custom"
			#Force all frontier owners to be shown or hidden on the minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			owner = "Custom"
			#Force all frontier banners to be shown or hidden on the minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			banner = "Custom"
			#Force all frontiers to be shown or hidden on the day minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			day = "Custom"
			#Force all frontiers to be shown or hidden on the night minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			night = "Custom"
			#Force all frontiers to be shown or hidden on the underground minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			underground = "Custom"
			#Force all frontiers to be shown or hidden on the topo minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			topo = "Custom"
			#Force all frontiers to be shown or hidden on the biome minimap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			biome = "Custom"

		[frontier.visibility.webmap]
			#Force all frontiers to be shown or hidden on the webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			visible = "Custom"
			#Force all frontier names to be shown or hidden on the webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			name = "Custom"
			#Force all frontier collection names to be shown or hidden on the webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			collection = "Custom"
			#Force all frontier owners to be shown or hidden on the webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			owner = "Custom"
			#Force all frontier banners to be shown or hidden on the webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			banner = "Custom"
			#Force all frontiers to be shown or hidden on the day webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			day = "Custom"
			#Force all frontiers to be shown or hidden on the night webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			night = "Custom"
			#Force all frontiers to be shown or hidden on the underground webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			underground = "Custom"
			#Force all frontiers to be shown or hidden on the topo webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			topo = "Custom"
			#Force all frontiers to be shown or hidden on the biome webmap. In Custom, you can decide for each frontier.
			#Allowed Values: Custom, Always, Never
			biome = "Custom"

	[frontier.new]
		#Shape used when creating a new frontier.
		#Allowed Values: Vertex, Chunk, Path
		shape = "Vertex"
		#Action to perform after creating a new frontier.
		#Allowed Values: InfoScreen, EditShape, DoNothing
		afterCreation = "InfoScreen"
		#Shape preset used when creating a new vertex frontier.
		#Range: 0 ~ 11
		vertexShape = 6
		#Number of vertices used by the selected vertex shape preset.
		#Range: 3 ~ 999
		vertexCount = 16
		#Width used by the selected vertex shape preset.
		#Range: 0 ~ 999
		vertexShapeWidth = 10
		#Radius used by the selected vertex shape preset.
		#Range: 0 ~ 999
		vertexShapeRadius = 20
		#Shape preset used when creating a new chunk frontier.
		#Range: 0 ~ 7
		chunkShape = 2
		#Width used by the selected chunk shape preset.
		#Range: 0 ~ 32
		chunkShapeWidth = 5
		#Length used by the selected chunk shape preset.
		#Range: 0 ~ 32
		chunkShapeLength = 5
		#Shape preset used when creating a new path frontier.
		#Range: 0 ~ 7
		pathShape = 1
		#Segment length used by the selected path shape preset.
		#Range: 1 ~ 999
		pathSegmentLength = 10

#Collection settings.
[collection]

	#Collection appearance settings.
	[collection.appearance]

		[collection.appearance.fill]
			#Transparency of the collection fill in collection view. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 0.4

		[collection.appearance.border]
			#Width of collection borders in collection view.
			#Range: 0 ~ 64
			width = 4
			#Transparency of collection borders in collection view. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 0.8

		[collection.appearance.text]
			#Size of the collection text.
			#Range: 1 ~ 5
			size = 2
			#Transparency of the collection text. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 1.0
			#Color of the collection text. Collection uses the collection color. Bright uses the same color at maximum brightness.
			#Allowed Values: FrontierColor, FrontierColorBright, White
			color = "FrontierColor"

		[collection.appearance.banner]
			#Size of the collection banner.
			#Range: 1 ~ 5
			size = 1
			#Transparency of the collection banner. 0.0 is fully transparent and 1.0 is opaque.
			#Range: 0.0 ~ 1.0
			opacity = 1.0

	[collection.default]
		#Default name for new collections.
		name = "New Collection"
		#Use a random color for new collections by default.
		randomColor = true
		#Fallback fixed color for new collections when random color is disabled.
		#Format: "RRGGBB". Also accepts "#RRGGBB", "0xRRGGBB", and "0xAARRGGBB".
		color = "E0E0E0"

		[collection.default.visibility]
			#Default visibility for new collections.
			visible = false

			[collection.default.visibility.fullscreen]
				#Default fullscreen collection zoom for new collections. 0 disables collection view.
				#Range: 0 ~ 16384
				zoom = 256
				#Default fullscreen name visibility for new collections.
				name = true
				#Default fullscreen owner visibility for new collections.
				owner = false
				#Default fullscreen banner visibility for new collections.
				banner = true

			[collection.default.visibility.minimap]
				#Default minimap collection zoom for new collections. 0 disables collection view.
				#Range: 0 ~ 16384
				zoom = 256
				#Default minimap name visibility for new collections.
				name = true
				#Default minimap owner visibility for new collections.
				owner = false
				#Default minimap banner visibility for new collections.
				banner = true

			[collection.default.visibility.webmap]
				#Default webmap collection zoom for new collections. 0 disables collection view.
				#Range: 0 ~ 16384
				zoom = 256
				#Default webmap name visibility for new collections.
				name = true
				#Default webmap owner visibility for new collections.
				owner = false
				#Default webmap banner visibility for new collections.
				banner = true

	[collection.visibility]
		#Force all collections to be shown or hidden. In Custom, you can decide for each collection.
		#Allowed Values: Custom, Always, Never
		visible = "Custom"

		[collection.visibility.fullscreen]
			#Force all collection names to be shown or hidden on the fullscreen map. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			name = "Custom"
			#Force all collection owners to be shown or hidden on the fullscreen map. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			owner = "Custom"
			#Force all collection banners to be shown or hidden on the fullscreen map. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			banner = "Custom"
			#Force collection zoom on the fullscreen map instead of using each collection.
			zoomForced = false
			#Forced collection zoom on the fullscreen map. 0 disables collection view.
			#Range: 0 ~ 16384
			zoom = 256

		[collection.visibility.minimap]
			#Force all collection names to be shown or hidden on the minimap. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			name = "Custom"
			#Force all collection owners to be shown or hidden on the minimap. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			owner = "Custom"
			#Force all collection banners to be shown or hidden on the minimap. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			banner = "Custom"
			#Force collection zoom on the minimap instead of using each collection.
			zoomForced = false
			#Forced collection zoom on the minimap. 0 disables collection view.
			#Range: 0 ~ 16384
			zoom = 256

		[collection.visibility.webmap]
			#Force all collection names to be shown or hidden on the webmap. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			name = "Custom"
			#Force all collection owners to be shown or hidden on the webmap. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			owner = "Custom"
			#Force all collection banners to be shown or hidden on the webmap. In Custom, you can decide for each collection.
			#Allowed Values: Custom, Always, Never
			banner = "Custom"
			#Force collection zoom on the webmap instead of using each collection.
			zoomForced = false
			#Forced collection zoom on the webmap. 0 disables collection view.
			#Range: 0 ~ 16384
			zoom = 256

[gui]
	#Show buttons on the fullscreen map.
	fullscreenButtons = true

	[gui.confirmation]
		#Show a confirmation dialog before deleting a frontier.
		frontierDelete = true
		#Show a confirmation dialog before deleting a collection.
		collectionDelete = true
		#Show a confirmation dialog before deleting a group.
		groupDelete = true
		#Show a confirmation dialog before deleting a user.
		userDelete = true
		#Show a confirmation dialog before creating a temporary frontier.
		temporaryFrontierCreate = true
		#Show a confirmation dialog before creating a temporary collection.
		temporaryCollectionCreate = true

[hud]
	#Show the HUD on screen.
	enabled = true
	#Automatically switch to nearest anchor when HUD position is edited (on settings screen).
	autoAdjustAnchor = true
	#Automatically snap to closest border when HUD position is edited (on settings screen).
	snapToBorder = true
	#Size of the HUD text.
	#Range: 1 ~ 8
	textSize = 1
	#Size of the HUD banner.
	#Range: 1 ~ 8
	bannerSize = 3
	#HUD elements in order from slot 1 to slot 4. Valid values: None, Name, Collection, Owner, Banner.
	slots = ["Name", "Collection", "Owner", "Banner"]
	#Anchor point of the HUD. When anchored to the minimap, coordinates are relative to the minimap's default position.
	#Allowed Values: ScreenTop, ScreenTopRight, ScreenRight, ScreenBottomRight, ScreenBottom, ScreenBottomLeft, ScreenLeft, ScreenTopLeft, Minimap, MinimapHorizontal, MinimapVertical
	anchor = "MinimapHorizontal"
	#Horizontal HUD offset relative to the selected anchor.
	#Range: -2147483648 ~ 2147483647
	xPosition = 0
	#Vertical HUD offset relative to the selected anchor.
	#Range: -2147483648 ~ 2147483647
	yPosition = 0

[paste]
	#Paste the name when pasting info.
	name = false
	#Paste visibility settings when pasting info.
	visibility = true
	#Paste the frontier path style when pasting info.
	pathStyle = true
	#Paste the color when pasting info.
	color = true
	#Paste the banner when pasting info.
	banner = true
	#Whether paste options are currently expanded.
	optionsVisible = false

[color]
	#Selected color input mode in color editors.
	#Allowed Values: RGB, HSV, Hexadecimal
	inputMode = "RGB"

#MapFrontiers list settings.
[list]

	[list.sorting]
		#Order of the MapFrontiers list sorting modes.
		priority = ["Created", "Name", "Owner", "Shape", "Area", "Modified"]
		#Direction of the MapFrontiers list sorting modes. True means ascending and false means descending.
		directions = [false, true, true, true, true, false]

	[list.filters]
		#Selected frontier shape filter in the MapFrontiers list.
		#Allowed Values: All, Vertex, Chunk, Path
		shape = "All"
		#Selected frontier owner filter in the MapFrontiers list.
		#Allowed Values: All, Self, Others
		owner = "All"
		#Selected dimension filter in the MapFrontiers list. Use "mapfrontiers:all" to show every dimension or "mapfrontiers:current" to show only the current one.
		dimension = "mapfrontiers:all"

[chatSharing]
	#Chat command used to send shared frontiers to another player.
	sendCommand = "msg"
