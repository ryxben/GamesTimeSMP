[gameplay]
	#The offset in the position of your satchel on your hotbar. 0 = covers slots 1-6, 3 = covers slots 4-9
	# Default: 0
	# Range: 0 ~ 3
	satchel_offset = 0
	#Whether items should swap into the Satchel Hotbar when shift is held while pressing a hotbar key.
	shift_swap = true

[rendering]
	#Whether the satchel should render on players when equipped.
	satchel_layer = true
	#Whether the satchel should animate in the GUI.
	gui_animation = true
