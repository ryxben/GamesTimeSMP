#Sol's AuthLogin System Configuration
[general]

	#Timeout Settings
	[general.timeout]
		#Seconds before player is kicked for not logging in (0 = disabled)
		# Default: 180
		# Range: 0 ~ 600
		loginTimeoutSeconds = 180
		#Seconds to wait before teleporting player back after successful login
		# Default: 5
		# Range: 1 ~ 60
		gracePeriodSeconds = 5
		#Minutes to keep session cached for auto-login if same IP reconnects (0 = disabled)
		# Default: 30
		# Range: 0 ~ 1440
		sessionCacheMinutes = 30

	#Security Settings
	[general.security]
		#Maximum failed login attempts before temporary lockout
		# Default: 5
		# Range: 1 ~ 20
		maxLoginAttempts = 5
		#Seconds to lock player out after max failed attempts
		# Default: 300
		# Range: 30 ~ 3600
		lockoutTimeSeconds = 300
		#Minimum password length
		# Default: 6
		# Range: 4 ~ 32
		minPasswordLength = 6
		#Maximum password length
		# Default: 32
		# Range: 8 ~ 128
		maxPasswordLength = 32
		#Require at least one special character in password
		requireSpecialChar = true
		#Require at least one number in password
		requireNumber = true
		#Enable automatic re-login if player reconnects from same IP within session timeout
		enableSessionCache = true
		#Kick player after too many failed login attempts
		kickOnLockout = true
		#Prevent multiple players from logging into the same account simultaneously
		preventMultipleLogins = true
		#Require players to have Sol's AuthLogin mod installed on client (recommended for token auto-login)
		requireClientMod = true

	#Spawn and Teleport Settings
	[general.spawn]
		#Move unauthenticated players to the auth staging spawn while spectator-locked
		teleportToSpawn = true
		#Return players to their saved pre-auth position after login (requires teleportToSpawn)
		teleportBackAfterLogin = true
		#When teleportToSpawn is true, use world spawn for auth staging
		useWorldSpawn = true
		#Auth staging X coordinate when teleportToSpawn=true and useWorldSpawn=false
		# Default: 0
		# Range: -30000000 ~ 30000000
		customSpawnX = 0
		#Auth staging Y coordinate when teleportToSpawn=true and useWorldSpawn=false
		# Default: 100
		# Range: -64 ~ 320
		customSpawnY = 100
		#Auth staging Z coordinate when teleportToSpawn=true and useWorldSpawn=false
		# Default: 0
		# Range: -30000000 ~ 30000000
		customSpawnZ = 0

	#Notification Settings
	[general.notifications]
		#Seconds between login reminder messages
		# Default: 10
		# Range: 5 ~ 60
		reminderIntervalSeconds = 10
		#Show title screen reminders
		showTitleReminders = true
		#Show action bar reminders
		showActionBarReminders = true

